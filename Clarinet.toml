[project]
name = "proven-bitcoin-device"
authors = ["Blockchain Device Security Team"]
description = "A blockchain-based platform for Bitcoin device verification and authentication"
telemetry = false
requirements = []
[contracts.bitcoin-device-verifier]
path = "contracts/bitcoin-device-verifier.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
